<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Webcam Jigsaw</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="stage" aria-label="Webcam jigsaw puzzle">
        <video id="webcam" autoplay playsinline muted></video>
        <div id="puzzleStage" class="puzzle-stage">
          <div id="slotLayer" class="slot-layer"></div>
          <div id="piecesLayer" class="pieces-layer"></div>
        </div>
        <div class="title-screen" id="titleScreen">
          <div class="poster" aria-hidden="true">
            <div class="poster-top">
              <span>Digital</span>
              <span>Twin</span>
            </div>
            <div class="poster-bottom">
              <span>Twin</span>
              <span>Digital</span>
            </div>
          </div>
          <button id="launchButton" class="launch-button" type="button">Practice</button>
        </div>
        <div class="status-pill is-hidden" id="statusText">Ready</div>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
